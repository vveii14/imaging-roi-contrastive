# ADHD 5-fold fusion: 3D-SCTF image + BrainNet ROI, contrastive fusion.
# Set data_root (or adhd_data_dir) to your data path. Example:
#   python train_kfold.py --dataset adhd --mode fusion --fusion contrastive --config configs/adhd_fusion_contrastive.yaml --n_folds 5

seed: 42
data_root: ./data
adhd_data_dir: ./data/adhd
n_rois: 116
roi_matrices_file: roi_matrices_775.npy
batch_size: 16
image_shape: [96, 96, 96]

use_image_branch: true
image_encoder: 3dsctf
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 96
  patch_size: 32
  embed_dim: 96
  depth: 4
  num_heads: 8
  mlp_ratio: 2.0

use_roi_branch: true
roi_encoder: brainnet
roi_feat_dim: 256
fusion: contrastive
contrastive_temperature: 0.07
contrastive_weight: 0.1

num_classes: 2
dropout: 0.3
epochs: 50
lr: 0.0001
weight_decay: 0.01
