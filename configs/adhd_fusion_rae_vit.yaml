# ADHD 5-fold fusion: RAE-ViT (image) + NeuroGraph (ROI)
# Run: python train_kfold_optuna_unified.py --dataset adhd --mode fusion --fusion concat|contrastive|cross_attention --config configs/adhd_fusion_rae_vit.yaml --n_trials 50 --study_name fusion_*_neurograph_rae_vit_adhd

seed: 42
device: cuda
data_root: ./data
adhd_data_dir: ./data/adhd
n_rois: 116
roi_matrices_file: roi_matrices_775.npy
batch_size: 4
image_shape: [96, 96, 96]

use_image_branch: true
image_encoder: rae_vit_ad
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 128
  embed_dim: 768
  num_heads: 8
  pretrained_checkpoint: null  # set path to .pth for ViT3D, see README

use_roi_branch: true
roi_encoder: brainnet
roi_feat_dim: 256
fusion: concat
contrastive_temperature: 0.07
contrastive_weight: 0.1

num_classes: 2
dropout: 0.3
epochs: 100
lr: 0.0001
weight_decay: 0.05
