# ADHD 5-fold image-only (RAE-ViT-AD)
# Run: python train_kfold.py --dataset adhd --config configs/adhd_image_only_rae_vit.yaml --mode image_only --n_folds 5
# Optuna: CUDA_VISIBLE_DEVICES=3 nohup python train_kfold_optuna_rae_vit.py --n_trials 200 > train_kfold_adhd_rae_vit_optuna.log 2>&1 &

seed: 42
device: cuda
data_root: ./data
adhd_data_dir: ./data/adhd
n_rois: 90
batch_size: 8
image_shape: [96, 96, 96]

use_image_branch: true
image_encoder: rae_vit_ad
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 128
  embed_dim: 768
  num_heads: 8
  pretrained_checkpoint: null  # set path to .pth for ViT3D, see README

use_roi_branch: false
roi_encoder: roi_vector
roi_feat_dim: 256
fusion: concat
num_classes: 2
dropout: 0.2
epochs: 100
lr: 0.0001
weight_decay: 0.05
