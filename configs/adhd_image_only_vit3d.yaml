# ADHD 5-fold image-only (ViT3D)
# Run: CUDA_VISIBLE_DEVICES=1 python train_kfold.py --dataset adhd --config configs/adhd_image_only_vit3d.yaml --mode image_only --n_folds 5

seed: 42
device: cuda
data_root: ./data
adhd_data_dir: ./data/adhd
n_rois: 90
batch_size: 4
image_shape: [96, 96, 96]

use_image_branch: true
image_encoder: vit3d
image_feat_dim: 256
image_encoder_kwargs:
  img_size: [96, 96, 96]
  patch_size: 16
  embed_dim: 768
  depth: 12
  n_heads: 12
  mlp_ratio: 4.0
  pretrained_checkpoint: null  # set path to .pth for ViT3D, see README
  checkpoint_key: net

use_roi_branch: false
roi_encoder: roi_vector
roi_feat_dim: 256
fusion: concat
num_classes: 2
dropout: 0.3
epochs: 100
lr: 0.0001
weight_decay: 0.05
