# ADHD 5-fold ROI-only (NeuroGraph + precomputed 116×116 Pearson matrices)
# Run: CUDA_VISIBLE_DEVICES=1 python train_kfold.py --dataset adhd --config configs/adhd_roi_only.yaml --mode roi_only --n_folds 5

seed: 42
device: cuda
data_root: ./data
adhd_data_dir: ./data/adhd
n_rois: 116
roi_matrices_file: roi_matrices_775.npy  # load precomputed Pearson (775, 116, 116)
batch_size: 16
image_shape: [96, 96, 96]

use_image_branch: false
image_encoder: conv3d
image_feat_dim: 256

use_roi_branch: true
roi_encoder: brainnet
roi_feat_dim: 256
fusion: concat
num_classes: 2
dropout: 0.5
epochs: 100
lr: 0.0001
weight_decay: 0.0005
