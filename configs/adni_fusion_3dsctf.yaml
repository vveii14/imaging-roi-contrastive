# ADNI 5-fold fusion: 3DSC-TF (image) + NeuroGraph (ROI)
# Run: CUDA_VISIBLE_DEVICES=3 python train_kfold_optuna_unified.py \
#   --dataset adni --mode fusion --fusion concat|contrastive|cross_attention \
#   --config configs/adni_fusion_3dsctf.yaml --n_trials 30

seed: 42
device: cuda
data_root: ./data
adni_data_dir: ./data/adni_fdg_pet
adni_image_dir: ./data/adni_fdg_pet/adni_image_128_crop_pad_rot180

n_rois: 90
batch_size: 4
image_shape: [128, 128, 128]

use_image_branch: true
image_encoder: 3dsctf
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 128
  patch_size: 32
  embed_dim: 96
  depth: 4
  num_heads: 8
  mlp_ratio: 2.0

use_roi_branch: true
roi_encoder: brainnet
roi_feat_dim: 256
fusion: concat
contrastive_temperature: 0.07
contrastive_weight: 0.1

num_classes: 3
dropout: 0.3
epochs: 100
lr: 0.0001
weight_decay: 0.05
