# ADNI 5-fold fusion: 3D-SCTF image + BrainNet ROI, contrastive fusion.
# Requires: FDG.csv, disease label.xlsx, and preprocessed images in adni_image_dir.
# Set data_root / adni_data_dir / adni_image_dir to your paths.

seed: 42
data_root: ./data
adni_data_dir: ./data/adni_fdg_pet
adni_image_dir: ./data/adni_fdg_pet/adni_image_128_crop_pad_rot180
n_rois: 90
batch_size: 16
image_shape: [128, 128, 128]

use_image_branch: true
image_encoder: 3dsctf
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 128
  patch_size: 32
  embed_dim: 96
  depth: 4
  num_heads: 8
  mlp_ratio: 2.0

use_roi_branch: true
roi_encoder: brainnet
roi_feat_dim: 256
fusion: contrastive
contrastive_temperature: 0.07
contrastive_weight: 0.1

num_classes: 3
dropout: 0.3
epochs: 60
lr: 0.0001
weight_decay: 0.01
