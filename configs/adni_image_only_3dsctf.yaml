# ADNI 5-fold image-only (3DSC-TF, preprocessed 128^3 image)
# Run:
# CUDA_VISIBLE_DEVICES=1 python train_kfold_optuna_unified.py \
#   --dataset adni --mode image_only \
#   --config configs/adni_image_only_3dsctf.yaml --n_trials 30

seed: 42
device: cuda
data_root: ./data
adni_data_dir: ./data/adni_fdg_pet
adni_image_dir: ./data/adni_fdg_pet/adni_image_128_crop_pad_rot180

n_rois: 90
batch_size: 8
image_shape: [128, 128, 128]

use_image_branch: true
image_encoder: 3dsctf
image_feat_dim: 256
image_encoder_kwargs:
  img_size: 128
  patch_size: 32
  embed_dim: 96
  depth: 4
  num_heads: 8
  mlp_ratio: 2.0

use_roi_branch: false
roi_encoder: roi_vector
roi_feat_dim: 256
fusion: concat
num_classes: 3
dropout: 0.2
epochs: 100
lr: 0.0001
weight_decay: 0.05
