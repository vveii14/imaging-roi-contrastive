# ADNI 5-fold ROI-only: Chen et al. 2019-style DNN (single atlas, DOI 10.1148/ryai.2019190012)
# Run: CUDA_VISIBLE_DEVICES=0 python train_kfold.py --dataset adni --mode roi_only \
#   --config configs/adni_roi_only_chen2019.yaml --n_folds 5
# Real-time tee log: add PYTHONUNBUFFERED=1 before the command, or watch data_root: ./data

seed: 42
device: cuda
data_root: ./data
adni_data_dir: ./data/adni_fdg_pet
adni_image_dir: ./data/adni_fdg_pet/adni_image_128_crop_pad_rot180
n_rois: 90
batch_size: 16
image_shape: [128, 128, 128]

use_image_branch: false
use_roi_branch: true
image_encoder: conv3d
image_feat_dim: 256
roi_encoder: chen2019
roi_feat_dim: 256
roi_encoder_kwargs:
  hidden: 512
fusion: concat
num_classes: 3
dropout: 0.5
epochs: 100
lr: 0.0001
weight_decay: 0.0005
